pre-commit:
  parallel: false
  commands:
    secrets:
      run: bash -c 'if command -v gitleaks >/dev/null 2>&1; then gitleaks detect --source . -v --no-banner; fi'
    fmt:
      glob: "*.go"
      run: go run mvdan.cc/gofumpt -l -w {staged_files} && git add {staged_files}
    lint:
      run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint run

pre-push:
  parallel: false
  commands:
    lint:
      run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint run
    test:
      run: go test ./...
