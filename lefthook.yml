# Git hooks. The full project gate lives in the Taskfile so it runs the same
# way everywhere (locally, in any CI, by hand). On Arch Linux the runner is the
# `go-task` package — the snippet below uses whichever of `task` / `go-task`
# is on PATH.

pre-commit:
  commands:
    check:
      # Full check: codegen freshness, format, tidy, build, lint, vuln, secrets.
      run: sh -c 'if command -v task >/dev/null 2>&1; then task check; else go-task check; fi'

pre-push:
  commands:
    test:
      # All tests — unit + integration (testcontainers, needs Docker).
      run: sh -c 'if command -v task >/dev/null 2>&1; then task test:all; else go-task test:all; fi'
