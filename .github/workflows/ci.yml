name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Verify formatting (gofumpt)
        run: |
          unformatted="$(go tool mvdan.cc/gofumpt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofumpt-formatted — run 'task fmt':"
            echo "$unformatted"
            exit 1
          fi

      - name: Verify code generation is up to date
        run: |
          go tool github.com/sqlc-dev/sqlc/cmd/sqlc generate
          go tool github.com/99designs/gqlgen generate
          go tool github.com/golangci/golangci-lint/v2/cmd/golangci-lint fmt
          go tool mvdan.cc/gofumpt -w .
          git diff --exit-code || (echo "Generated code is stale — run 'task gen'" && exit 1)

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum not tidy — run 'go mod tidy'" && exit 1)

      - name: Build
        run: go build ./...

      - name: Lint
        run: go tool github.com/golangci/golangci-lint/v2/cmd/golangci-lint run

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Test (unit + integration via testcontainers)
        run: >
          go test -race -tags=integration
          -coverpkg=./internal/...,./cmd/...
          -coverprofile=coverage.out ./...

      - name: Coverage gate (soft floor)
        run: |
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')"
          floor=35.0
          echo "Total coverage: ${total}% (floor: ${floor}%)"
          awk -v t="$total" -v f="$floor" 'BEGIN { if (t+0 < f+0) { printf "Coverage %.1f%% is below the floor %.1f%%\n", t, f; exit 1 } }'

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: govulncheck
        run: go tool golang.org/x/vuln/cmd/govulncheck ./...

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t liteend-go:ci --build-arg COMMIT=${GITHUB_SHA::8} .
