name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Verify code generation is up to date
        run: |
          go run github.com/sqlc-dev/sqlc/cmd/sqlc generate
          go run github.com/99designs/gqlgen generate
          go run mvdan.cc/gofumpt -w .
          git diff --exit-code || (echo "Generated code is stale — run 'task gen'" && exit 1)

      - name: Build
        run: go build ./...

      - name: Lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint run

      - name: Test (unit + integration via testcontainers)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t liteend-go:ci --build-arg COMMIT=${GITHUB_SHA::8} .
