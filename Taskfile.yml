version: "3"

vars:
  BIN: bin
  PKG: github.com/uxname/liteend-go

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: One-command onboarding for a fresh clone (env, hooks, codegen, deps DB)
    cmds:
      - cmd: cp -n .env.example .env || true
        silent: true
      - go tool github.com/bokwoon95/wgo version >/dev/null 2>&1 || true
      - lefthook install || echo "lefthook not installed; run 'go install github.com/evilmartians/lefthook@latest'"
      - task: gen
      - task: codegraph
      - docker compose up -d db redis
      - task: migrate
      - echo "Setup done. Start the app with hot-reload via 'task dev'."

  codegraph:
    desc: Build/refresh the local CodeGraph index for AI structural navigation (skipped if CLI absent)
    cmds:
      - cmd: sh -c 'if command -v codegraph >/dev/null 2>&1; then if [ -d .codegraph ]; then codegraph index; else codegraph init -i; fi; else echo "codegraph CLI not installed — skipping index (AI structural navigation)"; fi'
        silent: true

  dev:
    desc: Run the server locally with hot-reload (wgo) against the compose DB+Redis
    cmds:
      - docker compose up -d db redis
      - go tool github.com/bokwoon95/wgo run ./cmd/server

  run:
    desc: Run the server locally (no hot-reload)
    cmds:
      - go run ./cmd/server

  gen:
    desc: Run all code generators (sqlc, gqlgen) and format the output
    cmds:
      - task: gen:sqlc
      - task: gen:gqlgen
      - task: fmt

  gen:sqlc:
    desc: Generate type-safe DB access from db/queries
    cmds:
      - go tool github.com/sqlc-dev/sqlc/cmd/sqlc generate

  gen:gqlgen:
    desc: Generate GraphQL server code from schema
    cmds:
      - go tool github.com/99designs/gqlgen generate

  gen:check:
    desc: Fail if generated code (sqlc + gqlgen) is out of sync with the schema/queries
    cmds:
      # Regenerate, format only the generated output, then diff just those paths
      # so the check is robust on a dirty working tree (e.g. inside a git hook).
      - go tool github.com/sqlc-dev/sqlc/cmd/sqlc generate
      - go tool github.com/99designs/gqlgen generate
      # gqlgen also rewrites the resolver dir, so format it too (its hand-written
      # bodies are out of the diff scope below).
      - go tool github.com/golangci/golangci-lint/v2/cmd/golangci-lint fmt internal/db/sqlc internal/graph/generated internal/graph/model internal/graph/resolver
      - go tool mvdan.cc/gofumpt -w internal/db/sqlc internal/graph/generated internal/graph/model internal/graph/resolver
      - git diff --exit-code -- internal/db/sqlc internal/graph/generated internal/graph/model/models_gen.go || (echo "Generated code is stale — run 'task gen' and commit" && exit 1)

  check:
    desc: Full project check (codegen, format, tidy, build, lint, vuln, secrets) — run before committing
    cmds:
      - task: gen:check
      - task: tidy:check
      - task: fmt:check
      - go build ./...
      - task: lint
      - task: vuln
      - task: secrets

  secrets:
    desc: Scan the tree for committed secrets (gitleaks; skipped if not installed)
    cmds:
      - bash -c 'if command -v gitleaks >/dev/null 2>&1; then gitleaks detect --source . -v --no-banner; else echo "gitleaks not installed — skipping secret scan"; fi'

  build:
    desc: Build all binaries into ./bin
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BIN}}/server ./cmd/server
      - go build -o {{.BIN}}/dbbackup ./cmd/dbbackup
      - go build -o {{.BIN}}/dbrestore ./cmd/dbrestore
    vars:
      LDFLAGS:
        sh: 'echo "-X {{.PKG}}/internal/version.Commit=$(git rev-parse --short HEAD 2>/dev/null || echo unknown) -X {{.PKG}}/internal/version.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)"'

  lint:
    desc: Run golangci-lint
    cmds:
      - go tool github.com/golangci/golangci-lint/v2/cmd/golangci-lint run

  lint:fix:
    desc: Run golangci-lint with autofixes
    cmds:
      - go tool github.com/golangci/golangci-lint/v2/cmd/golangci-lint run --fix

  fmt:
    desc: Format code (gci import order + gofumpt)
    cmds:
      - go tool github.com/golangci/golangci-lint/v2/cmd/golangci-lint fmt
      - go tool mvdan.cc/gofumpt -w .

  fmt:check:
    desc: Fail if any file is not gofumpt-formatted
    cmds:
      - test -z "$(go tool mvdan.cc/gofumpt -l .)" || (go tool mvdan.cc/gofumpt -l . && echo "Unformatted files — run 'task fmt'" && exit 1)

  vuln:
    desc: Scan for known vulnerabilities (Go vuln DB)
    cmds:
      - go tool golang.org/x/vuln/cmd/govulncheck ./...

  test:
    desc: Run unit tests
    cmds:
      - go test -race ./...

  test:watch:
    desc: Re-run unit tests on every .go change (wgo)
    cmds:
      - go tool github.com/bokwoon95/wgo -file '.go$' go test -race ./...

  test:cov:
    desc: Run tests with coverage report
    cmds:
      - go test -race -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  test:integration:
    desc: Run integration/e2e tests (requires Docker for testcontainers)
    cmds:
      - go test -race -tags=integration ./...

  test:all:
    desc: Run ALL tests — unit + integration via testcontainers (requires Docker) — run before pushing
    cmds:
      - go test -race -count=1 -shuffle=on -tags=integration ./...

  migrate:
    desc: Apply database migrations with goose (URL built from DATABASE_* in .env)
    dotenv: ['.env']
    cmds:
      - go tool github.com/pressly/goose/v3/cmd/goose -dir db/migrations postgres "postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}?sslmode=disable" up

  db:reset:
    desc: Drop and recreate the dev database (DESTROYS local DB data)
    cmds:
      - docker compose down -v db
      - docker compose up -d db
      - sleep 3
      - task: migrate

  migration:create:
    desc: "Create a new goose migration (usage: task migration:create name=add_x)"
    requires:
      vars: [name]
    cmds:
      - go tool github.com/pressly/goose/v3/cmd/goose -dir db/migrations create {{.name}} sql

  mod:verify:
    desc: Verify module checksums
    cmds:
      - go mod verify

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  tidy:check:
    desc: Fail if go.mod/go.sum are not tidy
    cmds:
      - go mod tidy
      - git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum not tidy — run 'go mod tidy'" && exit 1)

  clean:
    desc: Remove build artifacts and coverage output (keeps ./data)
    cmds:
      - rm -rf {{.BIN}} coverage.out
